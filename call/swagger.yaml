openapi: 3.0.0
info:
  title: Call API
  version: 1.0.0

paths:
    /call/token:
    post:
      summary: Issue Agora RTC token
      description: >
        Generate an Agora RTC token for the child to join a video/audio channel.
        The backend signs the token using Agora App ID and App Certificate.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channelName, childId]
              properties:
                channelName:
                  type: string
                  description: Agora channel name (room ID)
                childId:
                  type: string
                  description: Child ID joining the call
            example:
              channelName: "room_abc123"
              childId: "child_001"
      responses:
        "200":
          description: Agora RTC token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  rtcToken:
                    type: string
                    description: Agora RTC token
                  appId:
                    type: string
                    description: Agora App ID
                  channelName:
                    type: string
                    description: Channel name (room ID)
                  uid:
                    type: integer
                    description: Agora UID assigned to the child
              example:
                rtcToken: "agora_rtc_token_xxxx"
                appId: "YOUR_AGORA_APP_ID"
                channelName: "room_abc123"
                uid: 12345
        "400":
          description: Invalid request
          content:
            application/json:
              example:
                error: "Missing channelName or childId"


    /call/end:
    post:
      summary: End call (Agora recording + AI summary)
      description: >
        End the Agora call, finalize Agora Cloud Recording,
        then run Whisper transcription, Moderation, and AI summary generation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [callId, channelName]
              properties:
                callId:
                  type: string
                channelName:
                  type: string
            example:
              callId: "call_123"
              channelName: "room_abc123"
      responses:
        "200":
          description: Call ended and summary processing started
          content:
            application/json:
              example:
                ended: true
                summaryGenerated: true


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
