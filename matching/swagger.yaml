openapi: 3.0.0
info:
  title: Matching API
  version: 1.0.0

paths:
  /matching/enqueue:
    post:
      summary: Enqueue child to matching queue
      description: >
        Add the child to the Redis matching queue.
        The backend will attempt to match with another child based on hobby tags and availability.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [childId]
              properties:
                childId:
                  type: string
                  description: ID of the child to enqueue
            example:
              childId: "child_001"
      responses:
        "200":
          description: Child added to queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              example:
                status: "waiting"
        "400":
          description: Invalid request
          content:
            application/json:
              example:
                error: "Child already in queue"

  /matching/status/{childId}:
    get:
      summary: Get matching status
      description: >
        Check whether the child is still waiting or has been matched.
        If matched, the frontend should call /matching/result to retrieve partner info.
      security:
        - bearerAuth: []
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: string
          description: Child ID to check
      responses:
        "200":
          description: Matching status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["waiting", "matched"]
                  partnerFound:
                    type: boolean
              examples:
                waiting:
                  value:
                    status: "waiting"
                    partnerFound: false
                matched:
                  value:
                    status: "matched"
                    partnerFound: true
        "404":
          description: Child not found in queue
          content:
            application/json:
              example:
                error: "Child not found"

  /matching/result/{childId}:
    get:
      summary: Get match result (channel name + partner info)
      description: >
       After a match is found, retrieve the partner's profile and the Agora channel name.
      security:
        - bearerAuth: []
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: string
          description: Child ID to retrieve match result for
      responses:
        "200":
          description: Match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchResult"
              example:
                channelName: "room_abc123"
                partner:
                  childId: "child_999"
                  name: "Emma"
                  age: 9
                  avatar: "rabbit_03"
                  hobbies: ["minecraft", "anime"]
        "404":
          description: No match found yet
          content:
            application/json:
              example:
                error: "Match not found"

components:
  schemas:
    MatchResult:
      type: object
      properties:
        roomId:
          type: string
        partner:
          type: object
          properties:
            childId:
              type: string
            name:
              type: string
            age:
              type: integer
            avatar:
              type: string
            hobbies:
              type: array
              items:
                type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

