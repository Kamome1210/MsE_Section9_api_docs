openapi: 3.0.0
info:
  title: Kids Language Exchange API
  version: 1.0.0
  description: >
    MVP API for Kids Language Exchange App.
    Backend: Hono/Express + Supabase + Redis + Stripe + Agora + OpenAI.

servers:
  - url: https://api.example.com

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ParentProfile:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        stripeCustomerId: { type: string }
        planStatus: { type: string }
        createdAt: { type: string }

    ChildProfile:
      type: object
      properties:
        id: { type: string }
        parentId: { type: string }
        name: { type: string }
        age: { type: integer }
        avatar: { type: string }
        hobbies:
          type: array
          items: { type: string }

    MatchResult:
      type: object
      properties:
        channelName: { type: string }
        partner:
          type: object
          properties:
            childId: { type: string }
            name: { type: string }
            age: { type: integer }
            avatar: { type: string }
            hobbies:
              type: array
              items: { type: string }

    CallSummary:
      type: object
      properties:
        callId: { type: string }
        childId: { type: string }
        partnerId: { type: string }
        summary: { type: string }
        flagged: { type: boolean }
        flaggedCategories:
          type: array
          items: { type: string }
        createdAt: { type: string }

security:
  - bearerAuth: []

paths:

  ############################################
  # 1. 認証（Supabase Auth を利用）
  ############################################

  /auth/verify:
    get:
      summary: Verify Supabase JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Valid token
        "401":
          description: Invalid token


  ############################################
  # 2. 子どもプロフィール
  ############################################

  /children:
    post:
      summary: Create child profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                age: { type: integer }
                avatar: { type: string }
                hobbies:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildProfile"

    get:
      summary: Get all children for parent
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of children
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChildProfile"


  /children/{childId}:
    patch:
      summary: Update child profile
      security:
        - bearerAuth: []
      parameters:
        - name: childId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChildProfile"
      responses:
        "200":
          description: Updated


  ############################################
  # 3. マッチング（Redis 待機列）
  ############################################

  /matching/enqueue:
    post:
      summary: Enqueue child to matching queue
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                childId: { type: string }
      responses:
        "200":
          description: Enqueued

  /matching/status/{childId}:
    get:
      summary: Get matching status
      security:
        - bearerAuth: []
      parameters:
        - name: childId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  partnerFound: { type: boolean }

  /matching/result/{childId}:
    get:
      summary: Get match result (channel + partner info)
      security:
        - bearerAuth: []
      parameters:
        - name: childId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchResult"


  ############################################
  # 4. 通話（Agora）
  ############################################

  /call/token:
    post:
      summary: Issue Agora RTC token
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                channelName: { type: string }
                childId: { type: string }
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  rtcToken: { type: string }
                  appId: { type: string }
                  channelName: { type: string }
                  uid:  { type: integer }
      "400":
         description: Invalid request

  /call/end:
    post:
      summary: End call (trigger recording + summary)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                callId: { type: string }
                channelName: { type: string }
      responses:
        "200":
          description: Call ended


  ############################################
  # 5. AI（Moderation / Whisper / Summary）
  ############################################

  /ai/moderate-text:
    post:
      summary: Real-time text moderation
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
      responses:
        "200":
          description: Moderation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  flagged: { type: boolean }
                  categories:
                    type: array
                    items: { type: string }

  /ai/call-summary/{callId}:
    get:
      summary: Get AI call summary
      security:
        - bearerAuth: []
      parameters:
        - name: callId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallSummary"


  ############################################
  # 6. 決済（Stripe）
  ############################################

  /billing/create-checkout:
    post:
      summary: Create Stripe checkout session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }

  /billing/webhook:
    post:
      summary: Stripe webhook endpoint
      responses:
        "200":
          description: OK


  ############################################
  # 7. 保護者ダッシュボード
  ############################################

  /dashboard/calls:
    get:
      summary: Get call history for parent
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Call history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallSummary"

  /dashboard/calls/{callId}:
    get:
      summary: Get call detail
      security:
        - bearerAuth: []
      parameters:
        - name: callId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Call detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallSummary"

 
